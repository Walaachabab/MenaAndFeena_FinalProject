<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <style>
    @font-face {
      font-family: 'Noto Naskh Arabic';
      src: url('fonts/NotoNaskhArabic-Regular.ttf');
      -fs-font-subset: complete-font;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Noto Naskh Arabic', Tahoma, Arial, sans-serif;
    }

    @page { margin: 0; }

    body {
      background: #FAE9CD;
      color: #333333;
      padding: 35px 28px;
      direction: rtl;
      unicode-bidi: embed;
      text-align: right;
      font-size: 14px;
    }

    .wrap {
      width: 720px;
      margin-left: auto;
      margin-right: auto;
    }

    .head {
      text-align: center;
      margin-bottom: 18px;
      direction: rtl;
      unicode-bidi: embed;
    }

    .logo {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      margin-bottom: 14px;
    }

    .title {
      color: #2e7d32;
      font-size: 30px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #777777;
      font-size: 15px;
    }

    .line {
      height: 1px;
      background: #e5dfcf;
      margin: 20px 0;
    }

    .card {
      background: #fffdf8;
      border: 1px solid #eadfcb;
      border-radius: 18px;
      padding: 30px 34px;
      direction: rtl;
      unicode-bidi: embed;
    }

    table {
      direction: rtl;
      unicode-bidi: embed;
    }

    th, td {
      direction: rtl;
      unicode-bidi: embed;
      text-align: right;
    }

    .card-top-table {
      width: 100%;
      border-collapse: collapse;
      border-bottom: 1px solid #eadfcb;
      margin-bottom: 6px;
    }

    .card-top-table td {
      vertical-align: top;
      padding-bottom: 24px;
    }

    .invoice-cell {
      width: 50%;
      text-align: right;
    }

    .meta-cell {
      width: 50%;
      text-align: left;
    }

    .invoice-title {
      font-size: 18px;
      font-weight: bold;
      color: #2e7d32;
    }

    .invoice-no {
      font-size: 19px;
      font-weight: bold;
      color: #2e7d32;
      margin-top: 4px;
      direction: ltr;
      text-align: right;
    }

    .status-badge {
      display: inline-block;
      margin-top: 10px;
      padding: 4px 16px;
      font-size: 13px;
      font-weight: bold;
      color: #2e7d32;
      background: #e8f5e9;
      border-radius: 12px;
    }

    .meta {
      font-size: 14px;
      color: #777777;
      line-height: 1.9;
    }

    .meta-val {
      direction: ltr;
      unicode-bidi: embed;
    }

    table.items {
      width: 100%;
      border-collapse: collapse;
      margin-top: 6px;
      direction: rtl;
      unicode-bidi: embed;
    }

    table.items thead th {
      font-size: 15px;
      font-weight: bold;
      color: #2e7d32;
      padding: 22px 0 15px;
      border-bottom: 1px solid #eadfcb;
    }

    th.item, td.item { text-align: right; }
    th.type, td.type { text-align: center; }
    th.amount, td.amount { text-align: left; }

    table.items tbody td {
      font-size: 14px;
      color: #555555;
      padding: 15px 0;
      vertical-align: top;
      border-bottom: 1px solid #f1ece0;
    }

    table.items tbody td.item {
      color: #333333;
    }

    table.items tbody td.amount {
      font-weight: bold;
      color: #2e7d32;
      white-space: nowrap;
      direction: ltr;
    }

    .item-details {
      font-size: 12px;
      color: #9a9a9a;
      line-height: 1.8;
      margin-top: 4px;
    }

    .total-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }

    .total-table td {
      padding-top: 22px;
    }

    .total-label {
      font-size: 18px;
      font-weight: bold;
      color: #2e7d32;
      text-align: right;
      width: 70%;
    }

    .total-amount {
      font-size: 22px;
      font-weight: bold;
      color: #2e7d32;
      white-space: nowrap;
      text-align: left;
      direction: ltr;
      width: 30%;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <img class="logo" src="{{logoSrc}}" alt="Mena And Feena" />
      <div class="title">تمت عملية الشراء بنجاح!</div>
      <div class="subtitle">شكراً للمساهمة في دعم بيئة وتكافل الحي السكني.</div>
    </div>

    <div class="line"></div>

    <div class="card">
      <table class="card-top-table">
        <tr>
          <td class="invoice-cell">
            <div class="invoice-title">فاتورة الطلب:</div>
            <div class="invoice-no">#{{invoiceNumber}}</div>
            <span class="status-badge">{{paymentStatus}}</span>
          </td>
          <td class="meta-cell">
            <div class="meta">
              <div>التاريخ: <span class="meta-val">{{orderDate}}</span></div>
              <div>المشتري: <span class="meta-val">{{buyerName}}</span></div>
            </div>
          </td>
        </tr>
      </table>

      <table class="items">
        <thead>
          <tr>
            <th class="item">العنصر</th>
            <th class="type">النوع</th>
            <th class="amount">المبلغ</th>
          </tr>
        </thead>
        <tbody>
          {{itemsRows}}
        </tbody>
      </table>

      <table class="total-table">
        <tr>
          <td class="total-label">المبلغ الإجمالي المدفوع:</td>
          <td class="total-amount">{{totalAmount}}</td>
        </tr>
      </table>
    </div>
  </div>
</body>
</html>
